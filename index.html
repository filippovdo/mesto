<!DOCTYPE html>
<html lang="ru">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Mesto: базовая функциональность</title>
      <link rel="stylesheet" href="./pages/index.css">
   </head>
   <body>
      <div class="page">
         <header class="header">
            <img src="./images/logo_w.svg" class="header__logo" alt="логотип">
            <img src="./images/Line.png" class="header__line" alt="линия">  
         </header>
         <main class="content">
            <section class="profile">
               <img src="images/avatar.jpeg" class="avatar" alt="аватар">
               <div class="profile__info">
                  <h1 class="profile__name">Жак-Ив Кусто</h1>
                  <a href="#" class="profile__edit-button"></a>
                  <p class="profile__text">Исследователь океана</p>
               </div>
               <a href="#" class="profile__add-button">+</a>
            </section>
            <section class="elements">
               <div class="element">
                  <img src="images/1.jpeg" class="element__cover" alt="Карачаевск">
                  <div class="element__block">
                     <h2 class="element__title">Карачаевск</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
               <div class="element">
                  <img src="images/2.jpeg" class="element__cover" alt="Гора Эльбрус">
                  <div class="element__block">
                     <h2 class="element__title">Гора Эльбрус</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
               <div class="element">
                  <img src="images/3.png" class="element__cover" alt="Домбай">
                  <div class="element__block">
                     <h2 class="element__title">Домбай</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
               <div class="element">
                  <img src="images/4.jpeg" class="element__cover" alt="Милан">
                  <div class="element__block">
                     <h2 class="element__title">Милан</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
               <div class="element">
                  <img src="images/5.jpeg" class="element__cover" alt="Карачаевск">
                  <div class="element__block">
                     <h2 class="element__title">Карачаевск</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
               <div class="element">
                  <img src="images/2.jpeg" class="element__cover" alt="Карачаево-Черкессия">
                  <div class="element__block">
                     <h2 class="element__title">Карачаево-Черкессия</h2>
                     <a href="#" class="element__like element__like_active"></a>
                  </div>
               </div>
            </section>
            <div class="popup">
               <div class="popup__container">
                  <a href="#" class="popup__close"></a>
                  <h2 class="popup__title">Редактировать профиль</h2>
                  <form class="popup__content">
                     <input type="text" class="popup__name" placeholder="Имя">
                     <input type="text" class="popup__text" placeholder="О себе">
                     <input type="submit" class="popup__button" value="Сохранить">
                  </form>
               </div>
            </div>
         </main>
         <footer class="footer">
            <p class="footer__copyright">© 2020 Mesto Russia</p>
         </footer>
      </div>
      <script src="./scripts/index.js"></script>
   </body>
</html>
